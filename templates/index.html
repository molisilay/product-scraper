<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品爬蟲搜尋</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 標題 -->
        <header>
            <h1>🔍 商品爬蟲搜尋</h1>
            <p class="subtitle">一次搜尋多個電商平台，比價＋比評論超方便！</p>
            <button id="darkToggle" class="dark-toggle" title="切換深色模式">🌙</button>
        </header>

        <!-- 搜尋區域 -->
        <div class="search-box">
            <form id="searchForm">
                <div class="input-row">
                    <div class="input-wrapper">
                        <input type="text" id="keyword" placeholder="輸入商品關鍵字，例如：藍牙耳機" required maxlength="100" autocomplete="off">
                        <div id="historyDropdown" class="history-dropdown hidden"></div>
                    </div>
                    <button type="submit" id="searchBtn">搜尋</button>
                </div>

                <div class="options-row">
                    <label class="source-label">
                        <input type="checkbox" name="sources" value="momo" checked>
                        <span class="chip momo">momo</span>
                    </label>
                    <label class="source-label">
                        <input type="checkbox" name="sources" value="pchome" checked>
                        <span class="chip pchome">PChome</span>
                    </label>
                    <label class="source-label">
                        <input type="checkbox" name="sources" value="shopee" checked>
                        <span class="chip shopee">蝦皮</span>
                    </label>
                    <label class="source-label">
                        <input type="checkbox" name="sources" value="pinduoduo">
                        <span class="chip pinduoduo">拼多多</span>
                    </label>
                    <label class="source-label">
                        <input type="checkbox" name="sources" value="books">
                        <span class="chip books">博客來</span>
                    </label>

                    <div class="max-items">
                        <label for="maxItems">每站上限</label>
                        <select id="maxItems">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="40">40</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <!-- 狀態列 -->
        <div id="status" class="status hidden"></div>

        <!-- 排序 + 篩選列 -->
        <div id="sortBar" class="sort-bar hidden">
            <span id="resultCount"></span>
            <div class="sort-controls">
                <button class="sort-btn active" data-sort="default">預設</button>
                <button class="sort-btn" data-sort="price-asc">價格低→高</button>
                <button class="sort-btn" data-sort="price-desc">價格高→低</button>
                <button class="sort-btn review-sort" data-sort="review-best" title="一星最少 + 銷量/評論多優先">⭐ 評論最優</button>
                <button class="sort-btn" data-sort="one-star-asc">一星少→多</button>
                <button class="sort-btn" data-sort="reviews-desc">評論多→少</button>
                <button class="sort-btn" data-sort="sales-desc">銷量多→少</button>
                <span class="separator">|</span>
                <button class="view-btn active" data-view="grid" title="格狀檢視">▦</button>
                <button class="view-btn" data-view="list" title="列表檢視">☰</button>
            </div>
        </div>

        <!-- 價格篩選 -->
        <div id="filterBar" class="filter-bar hidden">
            <div class="filter-section">
                <label>平台篩選：</label>
                <div id="sourceFilterGroup" class="source-filter-group"></div>
            </div>
            <div class="filter-section">
                <label>價格區間：</label>
                <input type="number" id="priceMin" placeholder="最低" min="0">
                <span>～</span>
                <input type="number" id="priceMax" placeholder="最高" min="0">
            </div>
            <div class="filter-section">
                <label>評論數 ≥</label>
                <input type="number" id="reviewMin" placeholder="不限" min="0">
                <label>一星 ≤</label>
                <input type="number" id="oneStarMax" placeholder="不限" min="0">
                <label>銷量 ≥</label>
                <input type="number" id="salesMin" placeholder="不限" min="0">
            </div>
            <div class="filter-section filter-actions">
                <button id="filterBtn" class="filter-apply-btn">套用篩選</button>
                <button id="filterClear" class="filter-clear-btn">清除全部</button>
                <span id="sourceStats" class="source-stats"></span>
            </div>
        </div>

        <!-- 結果區 -->
        <div id="results" class="results-grid"></div>

        <!-- 回到頂部 -->
        <button id="backToTop" class="back-to-top hidden" title="回到頂部">↑</button>
    </div>

    <footer>
        <p>商品爬蟲搜尋 &copy; 2026 — 僅供學習研究使用</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
